<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Song Detail</title>
  <style>
    body { font-family: system-ui, sans-serif; overflow-x: auto; margin: 20px; }
    h1 { margin-bottom: 0; }
    table { border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; white-space: nowrap; }

    /* 横ズレ抑制（対応ブラウザのみ・安全） */
    html { scrollbar-gutter: stable; }

    /* ライトボックス（共通） */
    .lightbox[hidden]{ display:none; }
    .lightbox{
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;     /* モバイルのツールバー出入りに追従 */
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.8);
      cursor: zoom-out;
      overscroll-behavior: contain;  /* 背景へのスクロール連鎖を防止 */
      padding: 0;
    }
    .lightbox img{
      width: 100%;
      height: 100%;
      object-fit: contain;  /* 等比で画面内に収める */
      max-width: none;
      max-height: none;
      border: none;
      background: #0000;
      box-shadow: none;
    }
  </style>

  <style>
    /* Lineup は border なし */
    table.lineup-table {
      border-collapse: collapse;
      margin: 6px 0 12px;
    }
    table.lineup-table td {
      border: none !important;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <a id="back-event" href="#">← イベントに戻る</a> |
  <a id="back-song" href="#">曲の全履歴を見る</a>

  <div id="content"></div>

  <!-- Lightbox Overlay（共通） -->
  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="">
  </div>

  <script>
    function getParams() {
      const p = new URLSearchParams(location.search);
      return {
        event: p.get("event"),
        song:  p.get("song"),
        seq:   p.get("seq")
      };
    }

    async function fileExists(url) {
      try {
        const r = await fetch(url, { method:'HEAD', cache:'no-cache' });
        return r.ok;
      } catch { return false; }
    }

    // === このイベント×曲順のギャラリーを収集（連番 1..25） ===
    async function collectGalleryImages(eventId, seq) {
      const urls = [];
      for (let i = 1; i <= 25; i++) {
        const u = `image/event_song_${eventId}_${seq}_${i}.webp`;
        if (await fileExists(u)) urls.push(u); else break;
      }
      return urls;
    }

    // 軽いエスケープ
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[m]));
    }

    async function main() {
      const { event, song, seq } = getParams();
      if (!event || !song) return;

      // イベント詳細を取得
      const ev = await fetch(`data/event/${encodeURIComponent(event)}.json`).then(r => r.json());

      // 対象の曲を探す
      const s = (ev.setlist || []).find(x => String(x.song_id) === String(song) && String(x.seq) === String(seq));
      if (!s) {
        document.getElementById("content").innerHTML = "<p>データが見つかりません。</p>";
        return;
      }

      // 曲名
      const title = s.song_title;

      // この曲の全出演イベント（song/{id}.json）
      const songDetail   = await fetch(`data/song/${encodeURIComponent(song)}.json`).then(r => r.json());
      const otherEvents  = (songDetail.events || []).filter(e => e.event_id != Number(event));

      // performer（Lineup と同じ2列テーブルで整形）
      let perf = "";
      if (s.performer && s.performer.length) {
        perf += `<table class="lineup-table">`;
        s.performer.forEach(p => {
          const role = p.position ? `${p.role}（${p.position}）` : p.role;
          perf += `
            <tr>
              <td>${escapeHtml(role)}</td>
              <td>：<a href="people.html?id=${encodeURIComponent(p.person_id)}">${escapeHtml(p.name)}</a></td>
            </tr>`;
        });
        perf += `</table>`;
      }

      // HTML 出力
      let html = "";
      html += `<h1>${escapeHtml(title)}</h1>`;

      // タイトルにイベント詳細へのリンク
      const eventLink = (ev?.id != null)
        ? `<a href="event.html?id=${encodeURIComponent(ev.id)}">${escapeHtml(ev.title)}</a>`
        : escapeHtml(ev.title || "");

      // 会場名に会場詳細へのリンク（venue_id があればリンク、なければ文字だけ）
      const venueLink = (ev?.venue_id != null)
        ? `<a href="venue.html?id=${encodeURIComponent(ev.venue_id)}">${escapeHtml(ev.venue || "")}</a>`
        : escapeHtml(ev.venue || "");

      html += `<p>${escapeHtml(ev.date)} 「${eventLink}」の ${escapeHtml(seq)} 曲目</p>`;
      html += `<p>会場: ${venueLink}</p>`;
      html += `<p>Version: ${escapeHtml(s.version || "")}</p>`;
      html += `<p>Note: ${escapeHtml(s.note || "")}</p>`;

      html += `<h3>Performer</h3>`;
      html += `<p>${perf}</p>`;

      // この曲の他の出演イベント（表形式）
      if (otherEvents.length > 0) {
        html += `<h3>この曲の他の出演イベント</h3>`;
        html += `<table>
          <tr>
            <th>日付</th>
            <th>イベント</th>
            <th>会場</th>
            <th>#</th>
          </tr>`;
        otherEvents.forEach(e => {
          html += `
            <tr>
              <td>${escapeHtml(e.date)}</td>
              <td><a href="event.html?id=${encodeURIComponent(e.event_id)}">${escapeHtml(e.title)}</a></td>
              <td><a href="venue.html?id=${encodeURIComponent(e.venue_id)}">${escapeHtml(e.venue)}</a></td>
              <td><a href="event-song.html?event=${encodeURIComponent(e.event_id)}&song=${encodeURIComponent(song)}&seq=${encodeURIComponent(e.seq)}">${escapeHtml(e.seq)}</a></td>
            </tr>`;
        });
        html += `</table>`;
      }

      const content = document.getElementById("content");
      content.innerHTML = html;

      // ▼ ギャラリーを描画（ある時だけ見出し＋一覧）
      const gallery = await collectGalleryImages(event, seq);
      if (Array.isArray(gallery) && gallery.length > 0) {
        content.insertAdjacentHTML(
          'beforeend',
          '<h3>ギャラリー</h3><div id="gallery" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;"></div>'
        );
        const container = document.getElementById('gallery');

        for (const src of gallery) {
          const img = document.createElement('img');
          img.className = 'zoomable';
          img.loading = 'lazy';
          img.decoding = 'async';
          img.alt = '';
          img.style.cssText = 'width:160px;height:auto;border:1px solid #ccc;border-radius:4px;cursor:zoom-in;opacity:0;';
          img.onload  = () => { img.style.opacity = '1'; };
          img.onerror = () => { img.remove(); };
          img.src = src;
          container.appendChild(img);
        }
      }

      // 戻りリンク
      document.getElementById("back-event").href = `event.html?id=${encodeURIComponent(event)}`;
      document.getElementById("back-song").href  = `song.html?id=${encodeURIComponent(song)}`;
    }

    /* === Lightbox Core（共通） === */
    const lb   = document.getElementById('lightbox');
    const lbImg= document.getElementById('lightbox-img');

    let __scrollY = 0;
    let __locked  = false;

    /* 開く時のスクロール固定は html に対して行う */
    function lockScroll(){
      if (__locked) return;
      __scrollY = window.scrollY || window.pageYOffset;
      const de = document.documentElement;
      de.style.position = 'fixed';
      de.style.top = `-${__scrollY}px`;
      de.style.left = '0';
      de.style.right = '0';
      de.style.width = '100%';
      __locked = true;
    }
    function unlockScroll(){
      if (!__locked) return;
      const de = document.documentElement;
      de.style.position = '';
      de.style.top = '';
      de.style.left = '';
      de.style.right = '';
      de.style.width = '';
      window.scrollTo(0, __scrollY);  // 開いた地点へ復帰
      __locked = false;
    }

    function openLightbox(src, alt=''){
      if (lb.hidden) lockScroll();  // 初回のみロック
      lbImg.src = src;
      lbImg.alt = alt;
      lb.hidden = false;
    }
    function closeLightbox(){
      lb.hidden = true;
      lbImg.src = '';
      unlockScroll();
    }

    /* 閉じ方の統一：背景クリック、画像タップ、ESC */
    lb.addEventListener('click', closeLightbox);
    lbImg.addEventListener('click', (e)=>{ e.stopPropagation(); closeLightbox(); });

    /* 起動 */
    main();
  </script>

<div style="margin-top:20px;">
  <a id="reportLink" target="_blank">このページの誤りを報告</a>
</div>

<script>
  // zoomable 画像のクリック委譲（ギャラリーを開く）
  document.addEventListener('click', (e) => {
    const img = e.target.closest('img.zoomable');
    if (!img) return;
    openLightbox(img.src, img.alt || '');
  });
  </script>

  <script src="settings.js"></script>
<script>
  // Google Form の URL を生成（現在のページURLを自動付与）
  const formURL =
    `https://docs.google.com/forms/d/e/${FORM_ID}/viewform?usp=pp_url&entry.${ENTRY_ID}=`
    + encodeURIComponent(location.href);
  document.getElementById("reportLink").href = formURL;
</script>
</body>
</html>
