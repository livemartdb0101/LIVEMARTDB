<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Era</title>
  <style>
    body { font-family: system-ui, sans-serif; overflow-x: auto; margin: 20px; }
    table { border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; white-space: nowrap; }
    img { max-width: 300px; border: 1px solid #ccc; margin: 10px 0; }

    /* クリック拡大用ライトボックス */
    .lightbox[hidden]{ display:none; }
    .lightbox{
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;                 /* モバイルのツールバー出入りに追従 */
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.8);
      cursor: zoom-out;
      overscroll-behavior: contain;    /* 背景へのスクロール連鎖を防止 */
      padding: 0;                      /* 余白で溢れないようゼロに */
    }

    /* 画像は“内接”で収める。スクロール不要・比率維持 */
    .lightbox img{
      width: 100%;
      height: 100%;
      object-fit: contain;             /* 等比で画面内に収めるポイント */
      max-width: none;                 /* 既存の max-* を無効化 */
      max-height: none;
      box-shadow: none;                /* 影や枠が要るなら、その分だけ size を引く */
      border: none;
      background: #0000;
    }


</style>
</head>
<body>
  <a href="index.html">← 検索に戻る</a>
  <div id="content"></div>
  <!-- ライトボックス（拡大画像表示用） -->
  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="">
  </div>
  <script>
    function getId() {
      return new URLSearchParams(location.search).get('id');
    }

    async function main() {
      const id = getId();
      if (!id) return;

      const era = await fetch(`data/era/${id}.json`).then(r => r.json());
      let html = '';

      html += `<h1>${era.name}</h1>`;
      
      // Era 画像（存在しなければ非表示 / クリックで拡大）
      const imgPath = `image/era_${id}.webp`;
      html += `
        <p>
          <img class="zoomable" src="${imgPath}" alt="${era.name}"
               onerror="this.style.display='none'">
        </p>
      `;

      if (era.events && era.events.length) {
        html += `<h3>イベント一覧</h3>`;
        html += `<table>
          <tr><th>日付</th><th>タイトル</th><th>形態</th></tr>`;

        era.events.forEach(ev => {
          html += `<tr>
            <td>${ev.date}</td>
            <td><a href="event.html?id=${ev.id}">${ev.title}</a></td>
            <td>${ev.form}</td>
          </tr>`;
        });

        html += `</table>`;
      } else {
        html += `<p>イベントなし</p>`;
      }

      document.getElementById('content').innerHTML = html;
    }

    // ----- ライトボックス本体 -----
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    function openLightbox(src, alt){
      // 画像セット
      lbImg.src = src;
      lbImg.alt = alt || '';

      // スクロール位置を保持してロック（ジャンプしない）
      __scrollY = window.scrollY || window.pageYOffset;
      document.body.style.position = 'fixed';
      document.body.style.top = `-${__scrollY}px`;
      document.body.style.left = '0';
      document.body.style.right = '0';
      document.body.style.width = '100%';

      lb.hidden = false;
    }

    function closeLightbox(){
      lb.hidden = true;
      lbImg.src = '';

      // ロック解除して元の位置に戻す
      document.body.style.position = '';
      document.body.style.top = '';
      document.body.style.left = '';
      document.body.style.right = '';
      document.body.style.width = '';

      window.scrollTo(0, __scrollY);  // ← 開いた地点へ復帰
    }


    // 画像クリックで拡大（zoomable に対するイベント委譲）
    document.addEventListener('click', (e) => {
      const img = e.target.closest('img.zoomable');
      if (img) openLightbox(img.src, img.alt);
    });
    // オーバーレイクリック/ESCで閉じる
    lb.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', (e) => {
      if (!lb.hidden && e.key === 'Escape') closeLightbox();
    });

    main();
  </script>

  <div style="margin-top:20px;">
    <a id="reportLink" target="_blank">このページの誤りを報告</a>
  </div>

  <script src="settings.js"></script>
  <script>
  // Google Form の URL を生成（現在のページURLを自動付与）
  const formURL =
    `https://docs.google.com/forms/d/e/${FORM_ID}/viewform?usp=pp_url&entry.${ENTRY_ID}=`
    + encodeURIComponent(location.href);

  // a タグにセット
  document.getElementById("reportLink").href = formURL;
  </script>
</body>
</html>
