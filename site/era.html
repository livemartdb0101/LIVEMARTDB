<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Era</title>
  <style>
    body { font-family: system-ui, sans-serif; overflow-x: auto; margin: 20px; }
    table { border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; white-space: nowrap; }
    img { max-width: 300px; border: 1px solid #ccc; margin: 10px 0; }

    /* 横ズレ抑制（対応ブラウザのみ・安全） */
    html { scrollbar-gutter: stable; }

    /* ライトボックス（共通） */
    .lightbox[hidden]{ display:none; }
    .lightbox{
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;     /* モバイルのツールバー出入りに追従 */
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.8);
      cursor: zoom-out;
      overscroll-behavior: contain;  /* 背景へのスクロール連鎖を防止 */
      padding: 0;
    }
    .lightbox img{
      width: 100%;
      height: 100%;
      object-fit: contain;  /* 等比で画面内に収める */
      max-width: none;
      max-height: none;
      border: none;
      background: #0000;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <a href="index.html">← 検索に戻る</a>
  <div id="content"></div>

  <!-- Lightbox Overlay（共通） -->
  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="">
  </div>

  <script>
    function getId() {
      return new URLSearchParams(location.search).get('id');
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function main() {
      const id = getId();
      if (!id) return;

      const era = await fetch(`data/era/${id}.json`).then(r => r.json());

      let html = '';
      html += `<h1>${escapeHtml(era.name)}</h1>`;

      // Era 画像（存在しなければ非表示 / クリックで拡大）
      const imgPath = `image/era_${id}.webp`;
      html += `
        <p>
          <img class="zoomable" src="${imgPath}" alt="${escapeHtml(era.name)}"
               onerror="this.style.display='none'">
        </p>
      `;

      if (Array.isArray(era.events) && era.events.length) {
        html += `<h3>イベント一覧</h3>`;
        html += `<table>
          <tr><th>日付</th><th>タイトル</th><th>形態</th></tr>`;
        era.events.forEach(ev => {
          html += `<tr>
            <td>${escapeHtml(ev.date)}</td>
            <td><a href="event.html?id=${encodeURIComponent(ev.id)}">${escapeHtml(ev.title)}</a></td>
            <td>${escapeHtml(ev.form)}</td>
          </tr>`;
        });
        html += `</table>`;
      } else {
        html += `<p>イベントなし</p>`;
      }

      document.getElementById('content').innerHTML = html;
    }

    /* === Lightbox Core（共通） === */
    const lb   = document.getElementById('lightbox');
    const lbImg= document.getElementById('lightbox-img');

    let __scrollY = 0;
    let __locked  = false;

    /* 開く時のスクロール固定は html に対して行う */
    function lockScroll(){
      if (__locked) return;
      __scrollY = window.scrollY || window.pageYOffset;
      const de = document.documentElement;
      de.style.position = 'fixed';
      de.style.top = `-${__scrollY}px`;
      de.style.left = '0';
      de.style.right = '0';
      de.style.width = '100%';
      __locked = true;
    }
    function unlockScroll(){
      if (!__locked) return;
      const de = document.documentElement;
      de.style.position = '';
      de.style.top = '';
      de.style.left = '';
      de.style.right = '';
      de.style.width = '';
      window.scrollTo(0, __scrollY);  // 開いた地点へ復帰
      __locked = false;
    }

    function openLightbox(src, alt=''){
      if (lb.hidden) lockScroll();  // 初回のみロック
      lbImg.src = src;
      lbImg.alt = alt;
      lb.hidden = false;
    }
    function closeLightbox(){
      lb.hidden = true;
      lbImg.src = '';
      unlockScroll();
    }

    /* 閉じ方の統一：背景クリック、画像タップ、ESC */
    lb.addEventListener('click', closeLightbox);
    lbImg.addEventListener('click', (e)=>{ e.stopPropagation(); closeLightbox(); });

    /* 起動 */
    main();
  </script>

  <div style="margin-top:20px;">
    <a id="reportLink" target="_blank">このページの誤りを報告</a>
  </div>

  <script>
    // zoomable 画像のクリック委譲（Era画像を開く）
    document.addEventListener('click', (e) => {
      const img = e.target.closest('img.zoomable');
      if (!img) return;
      openLightbox(img.src, img.alt || '');
    });
  </script>

  <script src="settings.js"></script>
  <script>
    // Google Form の URL を生成（現在のページURLを自動付与）
    const formURL =
      `https://docs.google.com/forms/d/e/${FORM_ID}/viewform?usp=pp_url&entry.${ENTRY_ID}=`
      + encodeURIComponent(location.href);
    document.getElementById("reportLink").href = formURL;
  </script>
</body>
</html>
