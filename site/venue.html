<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Venue</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; }
    table { border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; }
    img { max-width: 300px; border: 1px solid #ccc; margin: 10px 0; }

    /* クリック拡大用ライトボックス */
    .lightbox[hidden]{ display:none; }
    .lightbox{
      position:fixed; inset:0; z-index:9999;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.8); cursor:zoom-out;
    }
    .lightbox img{
      max-width:min(90vw,1200px); max-height:90vh;
      box-shadow:0 8px 24px rgba(0,0,0,.4); border-radius:4px; background:#fff;
    }
  </style>
</head>
<body>
  <a href="index.html">← 検索に戻る</a>
  <div id="content"></div>

  <!-- ライトボックス（拡大画像表示用） -->
  <div id="lightbox" class="lightbox" hidden>
    <img id="lightbox-img" alt="">
  </div>

  <script>
    function getParams() {
      const p = new URLSearchParams(location.search);
      return { id: p.get("id") };
    }


    async function main() {
      const { id } = getParams();
      if (!id) return;

      const venue = await fetch(`data/venue/${id}.json`).then(r => r.json());

      let html = '';
      html += `<h1>${venue.name}</h1>`;

          
      // ← ここに一時ログを入れる
      console.log('[before url block] venue.url =', venue?.url);

      
      // 公式HPリンク

      const u = (venue.url ?? '').trim();  // 空白だけの場合は非表示にしたいので trim は維持
      if (u) {
        // html += `<p>公式HP：<a href="${u}" target="_blank" rel="noopener noreferrer">${u}</a></p>`;
        html += `<p><a href="${u}" target="_blank" rel="noopener noreferrer">公式HP</a></p>`;
      }


        html += `<p>${venue.address || ""}</p>`;

      // 会場写真（venue_<id>.webp）存在しなければ非表示
      const imgPath = `image/venue_${id}.webp`;
      html += `
        <p>
          <img class="zoomable" src="${imgPath}" alt="${venue.name}"
               onerror="this.style.display='none'">
        </p>
      `;

      html += `<h2>この会場のイベント</h2>`;
      html += `<table>
        <tr><th>日付</th><th>イベント</th><th>形態</th></tr>`;

      (venue.events || []).forEach(ev => {
        html += `<tr>
          <td>${ev.date}</td>
          <td><a href="event.html?id=${ev.id}">${ev.title}</a></td>
          <td>${ev.form}</td>
        </tr>`;
      });

      html += `</table>`;

      document.getElementById("content").innerHTML = html;
      // クリック拡大は下のイベント委譲で一括対応
    }

    // ----- ライトボックス本体 -----
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    function openLightbox(src, alt){
      lbImg.src = src;
      lbImg.alt = alt || '';
      lb.hidden = false;
      document.body.style.overflow = 'hidden'; // 背景スクロール抑止
    }
    function closeLightbox(){
      lb.hidden = true;
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    // 画像クリックで拡大（zoomable に対するイベント委譲）
    document.addEventListener('click', (e) => {
      const img = e.target.closest('img.zoomable');
      if (img) openLightbox(img.src, img.alt);
    });
    // オーバーレイクリック/ESCで閉じる
    lb.addEventListener('click', closeLightbox);
    document.addEventListener('keydown', (e) => {
      if (!lb.hidden && e.key === 'Escape') closeLightbox();
    });

    main();
  </script>
  <div style="margin-top:20px;">
    <a id="reportLink" target="_blank">このページの誤りを報告</a>
  </div>

  <script src="settings.js"></script>
  <script>
  // Google Form の URL を生成（現在のページURLを自動付与）
  const formURL =
    `https://docs.google.com/forms/d/e/${FORM_ID}/viewform?usp=pp_url&entry.${ENTRY_ID}=`
    + encodeURIComponent(location.href);

  // a タグにセット
  document.getElementById("reportLink").href = formURL;
  </script>
</body>
</html>
